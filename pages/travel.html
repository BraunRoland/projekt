<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>projekt</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="../index.html">Főoldal</a>
          </li>
        <li class="nav-item">
            <a class="nav-link active">Utazásaim</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./bakancs.html">Bakancslistám</a>
          </li>
        </ul>
      </div>
      <div class="d-flex">
        <a href="#">Sötétmód</a>
        <button id="loginBtn" class="btn btn-primary">Bejelentkezés</button>
      </div>
    </nav>
    <div class="container" id="tablePage">
        <div class="row">
            <div class="col-sm-12">
                <table class="table">
                    <thead>
                        <tr>
                            <th data-key="city">Helyszín </th>
                            <th data-key="dateStart,dateEnd">Utazás ideje </th>
                            <th data-key="price">Költség </th>
                            <th data-key="rating">Értékelés </th>
                        </tr>
                    </thead>
                    <tbody id="tableAdat">

                    </tbody>
                </table>
            </div>
        </div>
        <div class="modal" id="loginModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="header">Bejelentkezés</h4>
                    <span class="close">&times;</span>
                </div>
                <div class="modal-body">
                    <form action="submit" id="loginForm">
                        <div class="mb-3 mt-3">
                            <label for="username" class="form-label">Felhasználónév:</label>
                            <input type="username" class="form-control" id="username" placeholder="Add meg a felhasználónevet" name="username">
                        </div>
                        <div class="mb-3">
                            <label for="pwd" class="form-label">Jelszó:</label>
                            <input type="password" class="form-control" id="pwd" placeholder="Jelszó" name="pwd">
                        </div>
                        <button type="submit" id="submit" class="btn btn-primary submit">Bejelentkezés</button>
                    </form>
                </div>
                <div id="loginAlert" class="alert alert-danger">
                  <strong>Hiba!</strong> Rossz felhasználónév és/vagy jelszó
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/travel.ts"></script>
    <script type="module" src="/src/modal.ts"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </body>
</html>
