<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>projekt</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-sm bg-dark navbar-dark">
      <div class="container-fluid">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Főoldal</a>
          </li>
        <li class="nav-item">
            <a class="nav-link active">Utazásaim</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="./bakancsAdmin.html">Bakancslistám</a>
          </li>
        </ul>
      </div>
      <div class="d-flex">
        <a href="#">Sötétmód</a>
        <button id="logoutBtn" class="btn btn-danger">Kijelentkezés</button>
      </div>
    </nav>
    <div class="container" id="tablePage">
      <div class="row">
        <div class="col-sm-12">
          <table class="table">
            <thead>
              <tr class="tableHead">
                  <th data-key="city">Helyszín </th>
                  <th data-key="dateStart,dateEnd">Utazás ideje </th>
                  <th data-key="price">Költség </th>
                  <th data-key="rating">Értékelés </th>
                  <th>asd</th>
              </tr>
            </thead>
            <tbody class="tableHead" id="tableAdat">

            </tbody>
          </table>
          <div class="modal" id="modifyModal">
            <div class="modal-content">
              <div class="modal-header">
                <h4 class="header">Módósítás</h4>
                <span class="close">&times;</span>
              </div>
              <div class="modal-body">
                <form action="submit" id="modiForm">
                  <div class="mb-3 mt-3">
                    <label for="city" class="form-label">Város:</label>
                    <input type="text" class="form-control" id="city" placeholder="Add meg a várost" name="city">
                  </div>
                  <div class="mb-3">
                    <label for="country" class="form-label">Ország:</label>
                    <input type="text" class="form-control" id="country" placeholder="add meg az országot" name="country">
                  </div>
                  <div class="mb-3">
                    <label for="date1" class="form-label">Utazás kezdete:</label>
                    <input type="date" class="form-control" id="date1" placeholder="add meg a kezdést" name="date1">
                  </div>
                  <div class="mb-3">
                    <label for="date2" class="form-label">Utazás vége:</label>
                    <input type="date" class="form-control" id="date2" placeholder="add meg a végét" name="date2">
                  </div>
                  <div class="mb-3">
                    <label for="price" class="form-label">Összeg:</label>
                    <input type="number" class="form-control" id="price" placeholder="add meg az összeget" name="price">
                  </div>
                  <div class="mb-3">
                    <label for="date2" class="form-label">Értékelés:</label>
                    <select class="form-select" id="rating">
                      <option value="1">1</option>
                      <option value="2">2</option>
                      <option value="3">3</option>
                      <option value="4">4</option>
                      <option value="5">5</option>
                    </select>
                    <div id="modiAlert" class="alert alert-danger" hidden>

                    </div>
                  </div>
                  <button delete id="delete" type="button" class="btn btn-danger delete">Törlés</button>
                  <button type="submit" id="submit" class="btn btn-primary submit">Módosítás</button>
                  <button type="button" id="createForm" class="btn btn-primary submit" hidden> Létrehozás</button>
                </form>                
              </div>
            </div>
        </div>
      </div>
    </div>  
    <div class="row">
      <div class="col-sm-12">
        <div class="d-grid">
          <button class="btn btn-primary" id="create">Létrehozás</button>
        </div>
      </div>
    </div>
    <script type="module" src="../src/travelAdmin.ts"></script>
    <script type="module" src="../src/modify.ts"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </body>
</html>
